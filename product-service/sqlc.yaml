version: "2"
sql:
  - schema: "pkg/server/rest/dtos/db/migrations"
    queries: "pkg/server/rest/dtos/db/queries"
    engine: "postgresql"
    gen:
      go:
        package: "db"
        out: "pkg/server/rest/dtos/db/sqlc"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true
        emit_db_tags: true
        emit_pointers_for_null_types: true
        emit_empty_slices: true
        emit_exported_queries: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/jackc/pgx/v5/pgtype.UUID"
          - db_type: "numeric"
            go_type: "github.com/jackc/pgx/v5/pgtype.Numeric"
          - db_type: "date"
            go_type: "github.com/jackc/pgx/v5/pgtype.Date"
          - db_type: "timestamptz"
            go_type: "github.com/jackc/pgx/v5/pgtype.Timestamptz"
          - db_type: "product_category"
            go_type: 
              import: "github.com/azar-writes-code/oolio-products-backend/pkg/server/rest/models/products"
              type: "ProductCategory"
          - db_type: "product_category[]"
            go_type: 
              import: "github.com/azar-writes-code/oolio-products-backend/pkg/server/rest/models/products"
              type: "[]ProductCategory"
          - db_type: "product_image"
            go_type: 
              import: "github.com/azar-writes-code/oolio-products-backend/pkg/server/rest/models/products"
              type: "Image"
          - column: "products.image"
            go_type: 
              import: "github.com/azar-writes-code/oolio-products-backend/pkg/server/rest/models/products"
              type: "Image"